        <h1>Contacto</h1>
        <p>¿Tienes alguna pregunta o propuesta? Rellena el formulario y me pondré en contacto contigo lo antes posible.</p>
        <form action="" method="POST">
          <fieldset>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Luis Eduardo" autofocus required>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
            <br>
            <label for="asunto">Asunto:</label>
            <input type="text" id="asunto" placeholder="Ingrese el asunto" required>
            <br>
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" required></textarea>
            <br>
            <button type="submit">Enviar</button>
        </fieldset>
      </form>
