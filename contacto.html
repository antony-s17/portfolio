<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://res.cloudinary.com/ddzxpi7rk/image/upload/v1775178300/icono_portafolio_buj5fg.png" type="image/png">
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <script type="module" src="./js/main.js"></script>
  <title>CV - Portfolio Antony Salas</title>
</head>
<body>
  <header id="header"></header>
  <main>
    <section class="contact-section">
        <h1>Contacto</h1>
        <p class="contact-intro">¿Tienes alguna pregunta o propuesta? Rellena el formulario y me pondré en contacto contigo lo antes posible.</p>
        <div class="contact-container">
          <form class="contact-form" action="https://formsubmit.co/salasrodriguezantony@hotmail.com" method="POST">
            <input type="hidden" name="_subject" value="Nuevo mensaje desde Portfolio">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <div class="form-group">
              <label for="nombre">Nombre:</label>
              <input type="text" id="nombre" placeholder="Luis Eduardo" autofocus required>
            </div>
            <div class="form-group">
              <label for="email">Email:</label>
              <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
              <label for="asunto">Asunto:</label>
              <input type="text" id="asunto" placeholder="Ingrese el asunto" required>
            </div>
            <div class="form-group">
              <label for="mensaje">Mensaje:</label>
              <textarea id="mensaje" required></textarea>
            </div>
            <button class="btn-submit" type="submit">Enviar</button>
          </form>
        </div>
    </section>
  </main>
  <footer id="footer"></footer>
</body>
</html>
